<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Transactions – Spark TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>
<style>
:root{
  --spark:#ff4d00;--spark2:#ff7b2e;--sg:rgba(255,77,0,.22);
  --accent:#00c8ff;--gold:#f5c842;
  --bg:#080b14;--bg2:#10141f;--bg3:#181d2d;
  --card:#141926;--card2:#1c2236;--card3:#232c42;
  --b2:rgba(255,255,255,.07);
  --t1:#eef1fc;--t2:#8e9abf;--mt:#4a5278;--mt2:#222840;
  --green:#00e676;--red:#ff3d3d;--sh:rgba(0,0,0,.7);
  --nh:60px;--bh:60px;--r:14px;
}
[data-theme="light"]{
  --bg:#f2f4fb;--bg2:#e6eaf6;--card:#fff;--card2:#f4f6fb;--card3:#eaecf6;
  --b2:rgba(0,0,0,.07);--t1:#0d0f1a;--t2:#3a4060;--mt:#8a94b8;--mt2:#d0d4e8;--sh:rgba(0,0,30,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--t1);font-size:15px;}
h1,h2,h3{font-family:'Syne',sans-serif;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--mt2);border-radius:2px;}
.topnav{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--nh);background:rgba(8,11,20,.95);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 16px;gap:10px;backdrop-filter:blur(20px);}
[data-theme="light"] .topnav{background:rgba(242,244,251,.97);}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--b2);background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:14px;transition:all .18s;}
.back-btn:hover{border-color:var(--spark);color:var(--spark);}
.nav-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;flex:1;}
.nb{width:34px;height:34px;border-radius:50%;border:1px solid var(--b2);background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:13px;transition:all .18s;}
.nb:hover{border-color:var(--spark);color:var(--spark);}
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;height:var(--bh);background:rgba(8,11,20,.97);border-top:1px solid var(--b2);display:flex;align-items:center;justify-content:space-around;backdrop-filter:blur(20px);}
[data-theme="light"] .bot-nav{background:rgba(242,244,251,.97);}
.bn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--mt);transition:color .18s;flex:1;padding:6px 0;text-decoration:none;min-width:0;}
.bn.active{color:var(--spark);}
.bn i{font-size:17px;}
.bn span{font-size:8.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;}
.main{padding:calc(var(--nh)+16px) 14px calc(var(--bh)+20px);max-width:620px;margin:0 auto;}

/* WALLET BAR */
.wallet-bar{background:linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,200,255,.06));border:1px solid rgba(0,230,118,.22);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.wb-left{}
.wb-label{font-size:10px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.wb-amt{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--green);line-height:1;}
.wb-sub{font-size:10px;color:var(--mt);font-weight:600;margin-top:2px;}
.wb-right{display:flex;gap:8px;flex-wrap:wrap;}
.wbtn{padding:8px 15px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;}
.wbtn.fund{background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;}
.wbtn.activate{background:linear-gradient(135deg,var(--green),#00aa55);color:#fff;}
.wbtn:disabled{opacity:.35;cursor:not-allowed;}
.wbtn:not(:disabled):hover{opacity:.88;transform:translateY(-1px);}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px;}
.sum-card{background:var(--card);border:1px solid var(--b2);border-radius:var(--r);padding:12px 14px;}
.sum-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;}
.sum-icon.spent{background:rgba(0,230,118,.1);color:var(--green);}
.sum-icon.txns{background:rgba(0,200,255,.1);color:var(--accent);}
.sum-icon.plan{background:rgba(245,200,66,.1);color:var(--gold);}
.sum-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;line-height:1;margin-bottom:3px;}
.sum-lbl{font-size:10px;color:var(--mt);font-weight:600;}

/* PLAN CARD */
.plan-card{background:linear-gradient(135deg,rgba(255,77,0,.12),rgba(0,200,255,.08));border:1px solid rgba(255,77,0,.25);border-radius:var(--r);padding:16px;margin-bottom:16px;}
.plan-card h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.plan-main{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.plan-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.plan-badge{padding:4px 12px;border-radius:14px;font-size:11px;font-weight:800;}
.plan-badge.active{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.3);}
.plan-badge.inactive{background:rgba(255,61,61,.12);color:var(--red);border:1px solid rgba(255,61,61,.3);}
.plan-details{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;}
.pd{font-size:11px;color:var(--t2);}
.pd strong{color:var(--t1);font-weight:800;}
.renew-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}

/* SECTION TITLE */
.sec-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;}
.sec-title i{color:var(--spark);font-size:12px;}

/* FILTERS */
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.fc{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid var(--b2);background:var(--card2);color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.fc.active{background:var(--spark);border-color:var(--spark);color:#fff;}

/* TXN CARDS */
.txn-card{background:var(--card);border:1px solid var(--b2);border-radius:var(--r);padding:14px 15px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:border-color .2s;}
.txn-card:hover{border-color:rgba(255,77,0,.3);}
.txn-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.txn-icon.success{background:rgba(0,230,118,.1);color:var(--green);}
.txn-icon.pending{background:rgba(245,200,66,.1);color:var(--gold);}
.txn-icon.failed{background:rgba(255,61,61,.1);color:var(--red);}
.txn-icon.refund{background:rgba(0,200,255,.1);color:var(--accent);}
.txn-content{flex:1;min-width:0;}
.txn-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px;}
.txn-title{font-size:13px;font-weight:800;font-family:'Syne',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txn-amount{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;flex-shrink:0;}
.txn-amount.credit{color:var(--green);}
.txn-amount.debit{color:var(--t1);}
.txn-sub{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.txn-plan{font-size:10px;color:var(--t2);font-weight:600;}
.txn-method{font-size:10px;color:var(--mt);background:var(--card2);border-radius:4px;padding:1px 6px;font-weight:700;}
.txn-time{font-size:10px;color:var(--mt);font-weight:600;margin-top:4px;}
.txn-status{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;flex-shrink:0;align-self:center;}
.status-success{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25);}
.status-pending{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.25);}
.status-failed{background:rgba(255,61,61,.12);color:var(--red);border:1px solid rgba(255,61,61,.25);}
.status-refund{background:rgba(0,200,255,.12);color:var(--accent);border:1px solid rgba(0,200,255,.25);}

/* MODAL */
.txn-modal-ov{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.88);display:none;align-items:flex-end;justify-content:center;}
.txn-modal-ov.open{display:flex;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.txn-modal{background:var(--card2);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;}
.txn-modal h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--b2);background:var(--card3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:12px;}
.detail-row{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--b2);}
.detail-row:last-child{border-bottom:none;}
.dr-label{font-size:11px;color:var(--mt);font-weight:700;width:110px;flex-shrink:0;}
.dr-val{font-size:12px;font-weight:700;color:var(--t1);flex:1;word-break:break-all;}

/* FUND WALLET DIALOG */
.fund-ov{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;padding:16px;}
.fund-ov.open{display:flex;animation:fi .18s ease;}
.fund-card{background:var(--card);border:1px solid rgba(0,230,118,.3);border-radius:20px;padding:28px 22px;max-width:400px;width:100%;text-align:center;}
.fund-card h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
.fund-card h2 i{color:var(--green);}
.fund-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0;}
.famt{padding:10px 5px;border-radius:10px;border:1px solid var(--b2);background:var(--card2);font-family:'Syne',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:var(--t2);transition:all .18s;text-align:center;}
.famt:hover,.famt.sel{background:linear-gradient(135deg,var(--spark),var(--spark2));border-color:var(--spark);color:#fff;}
.famt small{display:block;font-size:9px;font-family:'Nunito',sans-serif;font-weight:600;margin-top:2px;opacity:.8;}
.fund-note{font-size:11px;color:var(--t2);margin-bottom:14px;line-height:1.6;}
.fund-btns{display:flex;gap:8px;}
.fund-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid var(--b2);background:var(--card2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;}
.fund-pay{flex:2;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#00aa55);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--mt);}
.empty i{font-size:44px;margin-bottom:12px;display:block;color:var(--gold);opacity:.4;}
.empty h3{font-family:'Syne',sans-serif;font-size:16px;color:var(--t2);margin-bottom:6px;}
.empty p{font-size:12px;}
.loading-screen{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s;}
.loading-screen.hidden{opacity:0;pointer-events:none;}
.loading-logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--spark),var(--spark2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(80px);z-index:800;padding:9px 18px;border-radius:26px;font-size:12px;font-weight:700;background:var(--card3);border:1px solid var(--b2);box-shadow:0 8px 26px var(--sh);opacity:0;transition:all .26s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:rgba(0,230,118,.3);color:var(--green);}
.toast.err{border-color:rgba(255,61,61,.3);color:var(--red);}
.toast.info{border-color:rgba(0,200,255,.3);color:var(--accent);}
@media(max-width:380px){.summary-grid{grid-template-columns:1fr 1fr;}.sum-card:last-child{grid-column:span 2;}.bn span{font-size:7.5px;}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen"><div class="loading-logo">S</div></div>

<nav class="topnav">

</div>

<nav class="bot-nav">

<script>
const TG_TOKEN = "8700685464:AAEHRfSlwS3kI_cwCmWpD1O5kwCmjxzmC74";
const TG_CHAT  = "@database_sparktv";
const FB_CFG = {
  apiKey:"AIzaSyDAnOaWAy-bC435Fu0suYKIAmH4A3j-I_Y",
  authDomain:"spark-tv-4ce3f.firebaseapp.com",
  databaseURL:"https://spark-tv-4ce3f-default-rtdb.firebaseio.com",
  projectId:"spark-tv-4ce3f",
  storageBucket:"spark-tv-4ce3f.firebasestorage.app",
  messagingSenderId:"1041124519612",
  appId:"1:1041124519612:web:00a37105e3def9ef14aab9"
};
firebase.initializeApp(FB_CFG);
const _auth = firebase.auth();
const _db   = firebase.database();

const COUNTRIES = [
  {name:"Nigeria",code:"NG",currency:"NGN",symbol:"₦",initial:500,hourly:500,zone:"NGN"},
  {name:"United States",code:"US",currency:"USD",symbol:"$",initial:5,hourly:5,zone:"USD"},
  {name:"Canada",code:"CA",currency:"CAD",symbol:"CA$",initial:7,hourly:7,zone:"USD"},
  {name:"Australia",code:"AU",currency:"AUD",symbol:"A$",initial:8,hourly:8,zone:"USD"},
  {name:"United Kingdom",code:"GB",currency:"GBP",symbol:"£",initial:4,hourly:4,zone:"EUR"},
  {name:"Germany",code:"DE",currency:"EUR",symbol:"€",initial:5,hourly:5,zone:"EUR"},
  {name:"France",code:"FR",currency:"EUR",symbol:"€",initial:5,hourly:5,zone:"EUR"},
  {name:"Netherlands",code:"NL",currency:"EUR",symbol:"€",initial:5,hourly:5,zone:"EUR"},
  {name:"Sweden",code:"SE",currency:"SEK",symbol:"kr",initial:55,hourly:55,zone:"EUR"},
  {name:"Ghana",code:"GH",currency:"GHS",symbol:"GH₵",initial:60,hourly:60,zone:"NGN"},
  {name:"Kenya",code:"KE",currency:"KES",symbol:"KSh",initial:650,hourly:650,zone:"NGN"},
  {name:"South Africa",code:"ZA",currency:"ZAR",symbol:"R",initial:95,hourly:95,zone:"NGN"},
  {name:"India",code:"IN",currency:"INR",symbol:"₹",initial:420,hourly:420,zone:"USD"},
  {name:"Brazil",code:"BR",currency:"BRL",symbol:"R$",initial:26,hourly:26,zone:"USD"},
  {name:"Saudi Arabia",code:"SA",currency:"SAR",symbol:"ر.س",initial:19,hourly:19,zone:"EUR"},
  {name:"UAE",code:"AE",currency:"AED",symbol:"د.إ",initial:19,hourly:19,zone:"EUR"},
  {name:"Other",code:"XX",currency:"USD",symbol:"$",initial:5,hourly:5,zone:"USD"}
];
function getCountryInfo(name){return COUNTRIES.find(c=>c.name===name)||COUNTRIES[COUNTRIES.length-1];}

let isDark = localStorage.getItem("sparktv-theme") !== "light";
applyTheme(isDark);
function applyTheme(d){
  isDark=d;
  document.documentElement.setAttribute("data-theme",d?"dark":"light");
  document.getElementById("th-ic").className=d?"fa fa-sun":"fa fa-moon";
  localStorage.setItem("sparktv-theme",d?"dark":"light");
}
document.getElementById("theme-toggle").addEventListener("click",()=>applyTheme(!isDark));

let allTxns=[], userRecord=null, userWallet={balance:0,currency:"NGN",symbol:"₦"};
let currentFilter="All", selectedFundAmount=null;
const FILTERS=["All","Success","Pending","Failed","Refund"];

_auth.onAuthStateChanged(async user=>{
  document.getElementById("loading-screen").classList.add("hidden");
  if(!user||user.isAnonymous){
    document.getElementById("page-content").innerHTML=`
      <div class="empty"><i class="fa fa-lock" style="color:var(--mt);"></i><h3>Sign In Required</h3>
      <p>Please sign in to view your transaction history.</p>
      <a href="index.html" style="display:inline-block;margin-top:14px;padding:9px 22px;border-radius:10px;background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;font-weight:700;font-size:13px;">Go to Sign In</a></div>`;
    return;
  }
  try{
    const snap=await _db.ref(`users/${user.uid}`).once("value");
    userRecord=snap.val();
    const w=userRecord?.wallet;
    if(w) userWallet={balance:w.balance||0,currency:w.currency||"NGN",symbol:w.symbol||"₦"};
    // Live wallet listener
    _db.ref(`users/${user.uid}/wallet`).on("value",snap=>{
      const w=snap.val(); if(!w) return;
      userWallet={balance:w.balance||0,currency:w.currency||"NGN",symbol:w.symbol||"₦"};
      renderPage();
    });
  }catch(e){}
  await loadTransactions(user);
  _db.ref(`transactions/${user.uid}`).on("child_added",snap=>{
    const exists=allTxns.find(t=>t.key===snap.key);
    if(!exists){allTxns.unshift({key:snap.key,...snap.val()});renderPage();toast("💰 New transaction added","ok");}
  });
});

async function loadTransactions(user){
  try{
    const snap=await _db.ref(`transactions/${user.uid}`).orderByChild("timestamp").once("value");
    allTxns=[];snap.forEach(c=>allTxns.unshift({key:c.key,...c.val()}));
    renderPage();
  }catch(e){
    document.getElementById("page-content").innerHTML=`<div class="empty"><i class="fa fa-exclamation-triangle"></i><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

function renderPage(){
  const sub=userRecord?.subscription||{};
  const country=userRecord?.personal?.country||"Nigeria";
  const info=getCountryInfo(country);
  const bal=Number(userWallet.balance||0);
  const filtered=currentFilter==="All"?allTxns:allTxns.filter(t=>(t.status||"success").toLowerCase()===currentFilter.toLowerCase());
  const totalSpent=allTxns.filter(t=>t.status==="success"||t.status==="paid").reduce((a,t)=>a+(parseFloat(t.amount)||0),0);
  const isActive=sub.sub_status==="true"||sub.sub_status===true;
  const currentPlan=sub.plan_tier||sub.plan_id||"—";
  const expDate=sub.expiry_date?(typeof sub.expiry_date==="number"?new Date(sub.expiry_date).toLocaleString():new Date(sub.expiry_date).toLocaleString()):"—";
  const canActivate=bal>=info.hourly;

  let html=`
    <!-- WALLET BAR -->
    <div class="wallet-bar">
      <div class="wb-left">
        <div class="wb-label"><i class="fa fa-wallet"></i> My Wallet</div>
        <div class="wb-amt">${userWallet.symbol}${bal.toLocaleString()}</div>
        <div class="wb-sub">${userWallet.currency} · 1 hour = ${info.symbol}${info.hourly}</div>
      </div>
      <div class="wb-right">
        <button class="wbtn fund" onclick="openFundWallet()"><i class="fa fa-plus"></i> Fund</button>
        <button class="wbtn activate" onclick="activateOneHour()" ${canActivate?"":"disabled"}>
          <i class="fa fa-play"></i> ${canActivate?"Activate 1hr":"Need "+info.symbol+info.hourly}
        </button>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="summary-grid">
      <div class="sum-card">
        <div class="sum-icon spent"><i class="fa fa-coins"></i></div>
        <div class="sum-val">${userWallet.symbol}${totalSpent.toLocaleString()}</div>
        <div class="sum-lbl">Total Spent</div>
      </div>
      <div class="sum-card">
        <div class="sum-icon txns"><i class="fa fa-receipt"></i></div>
        <div class="sum-val">${allTxns.length}</div>
        <div class="sum-lbl">Transactions</div>
      </div>
      <div class="sum-card">
        <div class="sum-icon plan"><i class="fa fa-star"></i></div>
        <div class="sum-val" style="font-size:12px;">${xe(currentPlan)}</div>
        <div class="sum-lbl">Current Plan</div>
      </div>
    </div>

    <!-- PLAN CARD -->
    <div class="plan-card">
      <h3>Current Subscription</h3>
      <div class="plan-main">
        <div>
          <div class="plan-name">${xe(currentPlan)}</div>
          <div class="plan-details">
            <div class="pd">Status: <strong>${isActive?"Active":"Inactive"}</strong></div>
            <div class="pd">Expires: <strong>${expDate}</strong></div>
            <div class="pd">Quality: <strong>${sub.video_quality||"SD"}</strong></div>
          </div>
        </div>
        <span class="plan-badge ${isActive?"active":"inactive"}">${isActive?"✓ Active":"Inactive"}</span>
      </div>
      <button class="renew-btn" onclick="renewSubscription()">
        <i class="fa fa-star"></i> ${isActive?"Upgrade Plan":"Subscribe Now"}
      </button>
    </div>

    <!-- TXN LIST -->
    <div class="sec-title"><i class="fa fa-clock-rotate-left"></i> Payment History</div>
    <div class="filter-row">
      ${FILTERS.map(f=>`<div class="fc${currentFilter===f?" active":""}" onclick="setFilter('${f}')">${f}</div>`).join("")}
    </div>`;

  if(!filtered.length){
    html+=`<div class="empty">
      <i class="fa fa-receipt"></i>
      <h3>${allTxns.length===0?"No transactions yet":"No "+currentFilter.toLowerCase()+" transactions"}</h3>
      <p>${allTxns.length===0?"Your payment history will appear here.":"Try a different filter."}</p>
      ${allTxns.length===0?`<button onclick="renewSubscription()" style="margin-top:14px;padding:9px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Subscribe Now</button>`:""}
    </div>`;
  }else{
    filtered.forEach(txn=>{
      const status=(txn.status||"success").toLowerCase();
      const iconType=status==="pending"?"pending":status==="failed"?"failed":status==="refund"?"refund":"success";
      const iconFa=iconType==="success"?"fa-check":iconType==="pending"?"fa-clock":iconType==="failed"?"fa-xmark":"fa-rotate-left";
      const sym=txn.currency==="NGN"?"₦":txn.currency==="EUR"?"€":txn.currency==="GBP"?"£":"$";
      const amount=parseFloat(txn.amount)||0;
      const time=txn.timestamp?new Date(txn.timestamp).toLocaleString():(txn.date||"");
      html+=`<div class="txn-card" onclick="openTxnModal('${txn.key}')">
        <div class="txn-icon ${iconType}"><i class="fa ${iconFa}"></i></div>
        <div class="txn-content">
          <div class="txn-top">
            <div class="txn-title">${xe(txn.title||txn.plan_tier||"Subscription")}</div>
            <div class="txn-amount ${status==="refund"?"credit":"debit"}">${status==="refund"?"+":""}${sym}${amount.toLocaleString()}</div>
          </div>
          <div class="txn-sub">
            ${txn.plan_tier?`<span class="txn-plan">${xe(txn.plan_tier)}</span>`:""}
            ${txn.payment_method?`<span class="txn-method"><i class="fa fa-credit-card" style="margin-right:3px;"></i>${xe(txn.payment_method)}</span>`:""}
            <span class="txn-status status-${iconType}">${status}</span>
          </div>
          ${time?`<div class="txn-time"><i class="fa fa-calendar" style="margin-right:3px;"></i>${time}</div>`:""}
        </div>
      </div>`;
    });
  }
  document.getElementById("page-content").innerHTML=html;
}

window.setFilter=function(f){currentFilter=f;renderPage();};

window.openTxnModal=function(key){
  const txn=allTxns.find(t=>t.key===key); if(!txn) return;
  const status=(txn.status||"success").toLowerCase();
  const sym=txn.currency==="NGN"?"₦":txn.currency==="EUR"?"€":txn.currency==="GBP"?"£":"$";
  const amount=parseFloat(txn.amount)||0;
  const rows=[
    ["Transaction ID",txn.key],["Title",txn.title||txn.plan_tier||"Subscription"],
    ["Amount",sym+amount.toLocaleString()],["Status",txn.status||"success"],
    ["Plan",txn.plan_tier||txn.plan_id||"—"],["Billing Cycle",txn.billing_cycle||"—"],
    ["Payment Method",txn.payment_method||"—"],["Reference",txn.reference||txn.tx_ref||"—"],
    ["Date",txn.timestamp?new Date(txn.timestamp).toLocaleString():txn.date||"—"],
    ["Notes",txn.notes||"—"],
  ];
  document.getElementById("modal-body").innerHTML=rows.map(([k,v])=>`
    <div class="detail-row"><div class="dr-label">${k}</div><div class="dr-val">${xe(v)}</div></div>`).join("");
  document.getElementById("txn-modal-ov").classList.add("open");
};
window.closeModal=function(){document.getElementById("txn-modal-ov").classList.remove("open");};
document.getElementById("txn-modal-ov").addEventListener("click",function(e){if(e.target===this)closeModal();});

/* ACTIVATE 1 HOUR */
window.activateOneHour=async function(){
  const user=_auth.currentUser; if(!user||user.isAnonymous) return;
  const country=userRecord?.personal?.country||"Nigeria";
  const info=getCountryInfo(country);
  const bal=Number(userWallet.balance||0);
  if(bal<info.hourly){toast(`Need ${info.symbol}${info.hourly}. Fund your wallet first!`,"err");return;}
  try{
    const nowMs=Date.now();
    const expMs=nowMs+(60*60*1000);
    const newBal=bal-info.hourly;
    await _db.ref(`users/${user.uid}/subscription`).update({
      sub_status:"true",expiry_date:expMs,plan_tier:"1-Hour Pass",plan_id:"1hr",
      billing_cycle:"hourly",watch_access:true,video_quality:"SD",max_screens:1
    });
    await _db.ref(`users/${user.uid}/wallet`).update({balance:newBal,last_updated:firebase.database.ServerValue.TIMESTAMP});
    const txKey=_db.ref(`transactions/${user.uid}`).push().key;
    await _db.ref(`transactions/${user.uid}/${txKey}`).set({
      title:"1-Hour Access Pass",status:"success",amount:info.hourly,
      currency:info.currency,plan_tier:"1-Hour Pass",payment_method:"Wallet Balance",
      timestamp:firebase.database.ServerValue.TIMESTAMP
    });
    const nk=_db.ref(`notifications/${user.uid}`).push().key;
    await _db.ref(`notifications/${user.uid}/${nk}`).set({
      type:"payment",title:"1-Hour Access Activated! ✅",
      body:`${info.symbol}${info.hourly} deducted. Expires at ${new Date(expMs).toLocaleTimeString()}.`,
      emoji:"✅",timestamp:firebase.database.ServerValue.TIMESTAMP,read:false
    });
    userWallet.balance=newBal;
    toast("✓ 1-Hour pass activated! Go watch 📺","ok");
    sendTelegramMsg(`⚡ *1-Hour Pass*\n👤 ${userRecord?.personal?.username||user.email}\n💰 ${info.symbol}${info.hourly} deducted\n🆔 ${user.uid}`);
  }catch(e){toast("Error: "+e.message,"err");}
};

/* FUND WALLET */
function openFundWallet(){
  const country=userRecord?.personal?.country||"Nigeria";
  const info=getCountryInfo(country);
  const tiers=[
    {label:"1 Hour",amount:info.hourly},
    {label:"5 Hours",amount:info.hourly*5},
    {label:"30 Hours",amount:info.hourly*30},
  ];
  document.getElementById("fund-amounts").innerHTML=tiers.map((t,i)=>`
    <div class="famt${i===1?" sel":""}" onclick="selectFund(this,${t.amount},'${info.symbol}')">
      ${info.symbol}${t.amount.toLocaleString()}<small>${t.label}</small>
    </div>`).join("");
  selectedFundAmount=tiers[1].amount;
  document.getElementById("fund-note").textContent=`Pay ${info.symbol}${selectedFundAmount.toLocaleString()} via Email/WhatsApp. Balance credited after confirmation.`;
  document.getElementById("fund-ov").classList.add("open");
}
function closeFund(){document.getElementById("fund-ov").classList.remove("open");}
window.closeFund=closeFund;
window.selectFund=function(el,amount,symbol){
  selectedFundAmount=amount;
  document.querySelectorAll(".famt").forEach(f=>f.classList.remove("sel"));el.classList.add("sel");
  document.getElementById("fund-note").textContent=`Pay ${symbol}${amount.toLocaleString()} via Email/WhatsApp. Balance credited after confirmation.`;
};
window.proceedFund=function(){
  if(!selectedFundAmount){toast("Select an amount","err");return;}
  const user=_auth.currentUser; if(!user) return;
  const country=userRecord?.personal?.country||"Nigeria";
  const info=getCountryInfo(country);
  const name=userRecord?.personal?.username||user.email||"User";
  closeFund();
  window.open(`mailto:ng.spark.tv@gmail.com?subject=Spark TV Wallet Fund&body=Hello,%0A%0AI want to fund my wallet.%0A%0AName: ${encodeURIComponent(name)}%0AUser ID: ${user.uid}%0AAmount: ${info.symbol}${selectedFundAmount}%0ACurrency: ${info.currency}%0A%0APlease credit my wallet. Thank you!`,"_blank");
  const txKey=_db.ref(`transactions/${user.uid}`).push().key;
  _db.ref(`transactions/${user.uid}/${txKey}`).set({
    title:"Wallet Top-Up",status:"pending",amount:selectedFundAmount,
    currency:info.currency,payment_method:"Manual Transfer",plan_tier:"Wallet Fund",
    timestamp:firebase.database.ServerValue.TIMESTAMP
  }).catch(()=>{});
  sendTelegramMsg(`💳 *Fund Request*\n👤 ${name}\n💰 ${info.symbol}${selectedFundAmount}\n🆔 ${user.uid}`);
  toast("📧 Request sent. Balance credited after payment confirmation!","info");
};
window.openFundWallet=openFundWallet;

window.renewSubscription=function(){
  const user=_auth.currentUser;
  const name=userRecord?.personal?.username||user?.email||"User";
  const uid=user?.uid||"guest";
  window.open(`mailto:ng.spark.tv@gmail.com?subject=Spark TV Subscription Request&body=Hello,%0A%0AI want to subscribe to Spark TV.%0A%0AName: ${encodeURIComponent(name)}%0AUser ID: ${uid}%0A%0APlease activate my account. Thank you!`,"_blank");
  sendTelegramMsg(`💰 *Subscribe Request*\n👤 ${name}\n🆔 ${uid}`);
};

function sendTelegramMsg(text){
  fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:TG_CHAT,text,parse_mode:"Markdown"})
  }).catch(()=>{});
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
let _tt;
function toast(msg,type){
  const el=document.getElementById("toast");
  el.className=`toast ${type||"info"} show`;el.textContent=msg;
  clearTimeout(_tt);_tt=setTimeout(()=>{el.className="toast";},3500);
}
function xe(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
</script>
