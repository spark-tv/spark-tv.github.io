<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Weather – Spark TV</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--spark:#ff4d00;--spark2:#ff7b2e;--sg:rgba(255,77,0,.22);--accent:#00c8ff;--gold:#f5c842;--bg:#080b14;--bg2:#10141f;--card:#141926;--card2:#1c2236;--card3:#232c42;--b2:rgba(255,255,255,.07);--t1:#eef1fc;--t2:#8e9abf;--mt:#4a5278;--mt2:#222840;--green:#00e676;--red:#ff3d3d;--sh:rgba(0,0,0,.7);--nh:60px;--bh:60px;--r:14px;}
[data-theme="light"]{--bg:#f2f4fb;--bg2:#e6eaf6;--card:#fff;--card2:#f4f6fb;--b2:rgba(0,0,0,.07);--t1:#0d0f1a;--t2:#3a4060;--mt:#8a94b8;--mt2:#d0d4e8;--sh:rgba(0,0,30,.1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;}
h1,h2,h3{font-family:'Syne',sans-serif;}
.topnav{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--nh);background:rgba(8,11,20,.95);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 16px;gap:10px;backdrop-filter:blur(20px);}
[data-theme="light"] .topnav{background:rgba(242,244,251,.97);}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none;}
.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--spark),var(--spark2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;}
.brand-name{font-size:19px;font-weight:800;background:linear-gradient(135deg,var(--spark),var(--spark2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sp{flex:1;}
.nb{width:34px;height:34px;border-radius:50%;border:1px solid var(--b2);background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:13px;transition:border-color .18s,color .18s;}
.nb:hover{border-color:var(--spark);color:var(--spark);}
.main{padding-top:calc(var(--nh)+14px);padding-bottom:calc(var(--bh)+10px);padding:calc(var(--nh)+14px) 14px calc(var(--bh)+14px);}
.search-bar{display:flex;gap:9px;margin-bottom:18px;}
.search-bar input{flex:1;background:var(--card2);border:1px solid var(--b2);border-radius:24px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--t1);outline:none;transition:border-color .2s;}
.search-bar input:focus{border-color:var(--spark);}
.search-bar input::placeholder{color:var(--mt);}
.search-bar button{padding:10px 18px;border-radius:24px;border:none;background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.weather-hero{background:linear-gradient(135deg,rgba(0,150,255,.15),rgba(0,200,255,.08));border:1px solid rgba(0,200,255,.2);border-radius:20px;padding:28px 22px;text-align:center;margin-bottom:16px;}
.w-city{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px;}
.w-date{font-size:12px;color:var(--t2);margin-bottom:16px;}
.w-icon{font-size:64px;margin-bottom:10px;display:block;line-height:1;}
.w-temp{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1;margin-bottom:6px;}
.w-desc{font-size:15px;color:var(--t2);font-weight:600;text-transform:capitalize;}
.w-details{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;}
.wd-item{background:rgba(255,255,255,.04);border-radius:12px;padding:12px 8px;text-align:center;}
.wd-icon{font-size:18px;margin-bottom:4px;color:var(--accent);}
.wd-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.wd-lbl{font-size:10px;color:var(--mt);font-weight:600;margin-top:2px;}
.forecast-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:9px;margin-bottom:16px;}
.fc-card{background:var(--card);border:1px solid var(--b2);border-radius:var(--r);padding:12px 8px;text-align:center;}
.fc-day{font-size:10px;color:var(--mt);font-weight:700;margin-bottom:4px;}
.fc-icon{font-size:24px;margin-bottom:4px;}
.fc-hi{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.fc-lo{font-size:11px;color:var(--t2);}
.sec-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sec-title i{color:var(--spark);}
.loading{text-align:center;padding:40px;color:var(--mt);}
.error-box{background:rgba(255,61,61,.08);border:1px solid rgba(255,61,61,.2);border-radius:12px;padding:16px;text-align:center;color:var(--red);}
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;height:var(--bh);background:rgba(8,11,20,.97);border-top:1px solid var(--b2);display:flex;align-items:center;justify-content:space-around;backdrop-filter:blur(20px);}
[data-theme="light"] .bot-nav{background:rgba(242,244,251,.97);}
.bn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--mt);transition:color .18s;flex:1;padding:6px 0;text-decoration:none;}
.bn.active{color:var(--spark);}
.bn i{font-size:18px;}
.bn span{font-size:9px;font-weight:700;white-space:nowrap;}
</style>
</head>
<body>
<nav class="topnav">
  <a class="brand" href="sparktv.html">
    <div class="brand-icon">S</div>
    <span class="brand-name">Spark TV</span>
  </a>
  <div class="nav-sp"></div>
  <div class="nb" id="theme-toggle" title="Theme"><i class="fa fa-moon" id="th-ic"></i></div>
</nav>

<div class="main">
  <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:10px;"><i class="fa fa-cloud-sun" style="color:var(--spark);"></i> Weather</h2>
  <div class="search-bar">
    <input type="text" id="city-in" placeholder="Enter city name…" onkeydown="if(event.key==='Enter')getWeather()"/>
    <button onclick="getWeather()"><i class="fa fa-magnifying-glass"></i> Search</button>
  </div>
  <div id="weather-out"><div class="loading"><i class="fa fa-cloud-sun" style="font-size:40px;margin-bottom:10px;display:block;color:var(--accent);"></i>Enter a city to see weather</div></div>
</div>

<nav class="bot-nav">
  <a class="bn" href="sparktv.html"><i class="fa fa-house"></i><span>Home</span></a>
  <a class="bn" href="movies.html"><i class="fa fa-film"></i><span>Movies</span></a>
  <a class="bn active" href="weather.html"><i class="fa fa-cloud-sun"></i><span>Weather</span></a>
  <a class="bn" href="news.html"><i class="fa fa-newspaper"></i><span>News</span></a>
  <a class="bn" href="more.html"><i class="fa fa-grid-2"></i><span>More</span></a>
  <a class="bn" href="sparktv.html"><i class="fa fa-circle-user"></i><span>Profile</span></a>
</nav>

<script>
let isDark=localStorage.getItem("sparktv-theme")!=="light";
applyTheme(isDark);
function applyTheme(d){isDark=d;document.documentElement.setAttribute("data-theme",d?"dark":"light");document.getElementById("th-ic").className=d?"fa fa-sun":"fa fa-moon";localStorage.setItem("sparktv-theme",d?"dark":"light");}
document.getElementById("theme-toggle").addEventListener("click",()=>applyTheme(!isDark));

// Auto-detect location on load
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    fetchWeatherCoords(pos.coords.latitude,pos.coords.longitude);
  }, ()=>{}); // silently fail
}

async function getWeather(){
  const city=(document.getElementById("city-in").value||"").trim();
  if(!city)return;
  document.getElementById("weather-out").innerHTML='<div class="loading"><i class="fa fa-spinner fa-spin" style="font-size:32px;color:var(--accent);"></i><br/>Loading weather…</div>';
  try{
    const r=await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
    if(!r.ok)throw new Error("City not found");
    const d=await r.json();
    renderWeather(d,city);
  }catch(e){
    document.getElementById("weather-out").innerHTML=`<div class="error-box"><i class="fa fa-triangle-exclamation"></i> ${e.message||"Could not load weather"}</div>`;
  }
}

async function fetchWeatherCoords(lat,lon){
  try{
    const r=await fetch(`https://wttr.in/${lat},${lon}?format=j1`);
    if(!r.ok)return;
    const d=await r.json();
    renderWeather(d,"Your Location");
  }catch(e){}
}

function renderWeather(d,city){
  const cur=d.current_condition[0];
  const desc=cur.weatherDesc[0].value;
  const tempC=cur.temp_C;
  const feels=cur.FeelsLikeC;
  const humid=cur.humidity;
  const wind=cur.windspeedKmph;
  const vis=cur.visibility;
  const icon=weatherIcon(desc.toLowerCase());
  const nearest=d.nearest_area?.[0];
  const loc=nearest?`${nearest.areaName[0].value}, ${nearest.country[0].value}`:city;
  const now=new Date();
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let fcHtml=d.weather.map(w=>{
    const hi=w.maxtempC,lo=w.mintempC;
    const di=weatherIcon(w.hourly[4]?.weatherDesc[0].value.toLowerCase()||"");
    const dt=new Date(w.date);
    return `<div class="fc-card"><div class="fc-day">${days[dt.getDay()]}</div><div class="fc-icon">${di}</div><div class="fc-hi">${hi}°</div><div class="fc-lo">${lo}°</div></div>`;
  }).join("");
  document.getElementById("weather-out").innerHTML=`
    <div class="weather-hero">
      <div class="w-city">${xe(loc)}</div>
      <div class="w-date">${now.toLocaleDateString("en",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
      <span class="w-icon">${icon}</span>
      <div class="w-temp">${tempC}°C</div>
      <div class="w-desc">${xe(desc)}</div>
      <div class="w-details">
        <div class="wd-item"><div class="wd-icon"><i class="fa fa-temperature-half"></i></div><div class="wd-val">${feels}°C</div><div class="wd-lbl">Feels Like</div></div>
        <div class="wd-item"><div class="wd-icon"><i class="fa fa-droplet"></i></div><div class="wd-val">${humid}%</div><div class="wd-lbl">Humidity</div></div>
        <div class="wd-item"><div class="wd-icon"><i class="fa fa-wind"></i></div><div class="wd-val">${wind}</div><div class="wd-lbl">km/h Wind</div></div>
      </div>
    </div>
    <div class="sec-title"><i class="fa fa-calendar-days"></i> 3-Day Forecast</div>
    <div class="forecast-row">${fcHtml}</div>
  `;
}
function weatherIcon(desc){
  if(desc.includes("sunny")||desc.includes("clear"))return"☀️";
  if(desc.includes("cloud"))return"☁️";
  if(desc.includes("overcast"))return"🌥️";
  if(desc.includes("rain")||desc.includes("drizzle"))return"🌧️";
  if(desc.includes("snow"))return"❄️";
  if(desc.includes("thunder")||desc.includes("storm"))return"⛈️";
  if(desc.includes("fog")||desc.includes("mist"))return"🌫️";
  if(desc.includes("wind"))return"💨";
  return"🌤️";
}
function xe(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
</script>
</body>
</html>
