<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>News – Spark TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --spark:#ff4d00;--spark2:#ff7b2e;--sg:rgba(255,77,0,.22);
  --accent:#00c8ff;--gold:#f5c842;
  --bg:#080b14;--bg2:#10141f;--card:#141926;--card2:#1c2236;--card3:#232c42;
  --b2:rgba(255,255,255,.07);--t1:#eef1fc;--t2:#8e9abf;--mt:#4a5278;--mt2:#222840;
  --green:#00e676;--red:#ff3d3d;--sh:rgba(0,0,0,.7);
  --nh:60px;--bh:60px;--r:14px;
}
[data-theme="light"]{
  --bg:#f2f4fb;--bg2:#e6eaf6;--card:#fff;--card2:#f4f6fb;
  --b2:rgba(0,0,0,.07);--t1:#0d0f1a;--t2:#3a4060;--mt:#8a94b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;}
h1,h2,h3{font-family:'Syne',sans-serif;}
a{text-decoration:none;color:var(--t1);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--mt2);border-radius:2px;}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--nh);background:rgba(8,11,20,.95);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 14px;gap:8px;backdrop-filter:blur(20px);}
[data-theme="light"] .topnav{background:rgba(242,244,251,.97);}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--b2);background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:13px;flex-shrink:0;transition:all .18s;}
.back-btn:hover{border-color:var(--spark);color:var(--spark);}
.brand{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;}
.brand-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--spark),var(--spark2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;}
.brand-name{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--spark),var(--spark2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sp{flex:1;}
.nb{width:34px;height:34px;border-radius:50%;border:1px solid var(--b2);background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:13px;transition:all .18s;}
.nb:hover{border-color:var(--spark);color:var(--spark);}

/* MAIN */
.main{padding:calc(var(--nh)+14px) 14px calc(var(--bh)+14px);}

/* HERO SEARCH */
.news-hero{background:linear-gradient(135deg,rgba(255,77,0,.12),rgba(0,200,255,.08));border:1px solid rgba(255,77,0,.2);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.news-hero-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;}
.news-hero-title i{color:var(--spark);}
.news-srch{position:relative;display:flex;align-items:center;}
.news-srch input{background:var(--card2);border:1px solid var(--b2);border-radius:20px;padding:7px 30px 7px 32px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--t1);outline:none;width:140px;transition:width .2s,border-color .2s;}
.news-srch input:focus{width:180px;border-color:var(--spark);}
.news-srch input::placeholder{color:var(--mt);}
.nsi{position:absolute;left:10px;color:var(--mt);font-size:11px;pointer-events:none;}

/* CATEGORY BAR */
.cat-bar{display:flex;gap:5px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.cat-bar::-webkit-scrollbar{display:none;}
.cc{padding:5px 13px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid var(--b2);background:var(--card2);color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .13s;}
.cc:hover{border-color:var(--spark);color:var(--spark);}
.cc.active{background:var(--spark);border-color:var(--spark);color:#fff;}

/* NEWS GRID */
.news-grid{display:flex;flex-direction:column;gap:10px;}
.news-card{background:var(--card);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .18s;display:flex;text-decoration:none;color:var(--t1);}
.news-card:hover{border-color:rgba(255,77,0,.4);transform:translateY(-2px);}
.news-card.featured{flex-direction:column;}
.news-img{width:100px;flex-shrink:0;aspect-ratio:1/1;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:28px;}
.news-img img{width:100%;height:100%;object-fit:cover;}
.news-card.featured .news-img{width:100%;height:180px;aspect-ratio:unset;}
.news-body{padding:10px 12px;flex:1;min-width:0;}
.news-source-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.news-source{font-size:10px;font-weight:700;color:var(--spark);text-transform:uppercase;letter-spacing:.05em;}
.news-cat-tag{font-size:9px;font-weight:700;background:var(--card2);color:var(--t2);padding:2px 7px;border-radius:6px;}
.news-title{font-size:13px;font-weight:700;line-height:1.45;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.news-card.featured .news-title{-webkit-line-clamp:2;font-size:15px;}
.news-date{font-size:10px;color:var(--mt);font-weight:600;}
.news-desc{font-size:11px;color:var(--t2);line-height:1.5;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* LOADING */
.loading{text-align:center;padding:40px 20px;color:var(--mt);}
.loading i{font-size:32px;display:block;margin-bottom:10px;}

/* BOT NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;height:var(--bh);background:rgba(8,11,20,.97);border-top:1px solid var(--b2);display:flex;align-items:center;justify-content:space-around;backdrop-filter:blur(20px);}
[data-theme="light"] .bot-nav{background:rgba(242,244,251,.97);}
.bn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--mt);transition:color .18s;flex:1;padding:6px 0;text-decoration:none;min-width:0;}
.bn.active{color:var(--spark);}
.bn i{font-size:17px;}
.bn span{font-size:8.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;}

/* TOAST */
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(80px);z-index:800;padding:9px 18px;border-radius:26px;font-size:12px;font-weight:700;background:var(--card3);border:1px solid var(--b2);box-shadow:0 8px 26px var(--sh);opacity:0;transition:all .26s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.info{border-color:rgba(0,200,255,.3);color:var(--accent);}
.toast.err{border-color:rgba(255,61,61,.3);color:var(--red);}

@media(max-width:400px){.brand-name{display:none;}.news-srch input{width:100px;}.bn span{font-size:7.5px;}}
</style>
</head>
<body>

<nav class="topnav">
  <a class="back-btn" href="index.html"><i class="fa fa-arrow-left"></i></a>
  <a class="brand" href="index.html">
    <div class="brand-icon">S</div>
    <span class="brand-name">Spark TV</span>
  </a>
  <div class="nav-sp"></div>
  <div class="news-srch">
    <i class="fa fa-magnifying-glass nsi"></i>
    <input type="text" id="news-search" placeholder="Search news…" oninput="filterNews(this.value)" autocomplete="off"/>
  </div>
  <div class="nb" id="theme-toggle"><i class="fa fa-moon" id="th-ic"></i></div>
</nav>

<div class="main">
  <div class="news-hero">
    <div class="news-hero-title"><i class="fa fa-newspaper"></i> Latest News</div>
    <span id="news-count" style="font-size:11px;color:var(--mt);font-weight:600;"></span>
  </div>
  <div class="cat-bar" id="cats"></div>
  <div class="news-grid" id="news-grid">
    <div class="loading"><i class="fa fa-spinner fa-spin" style="color:var(--accent);"></i>Loading news…</div>
  </div>
</div>

<nav class="bot-nav">
  <a class="bn" href="index.html"><i class="fa fa-house"></i><span>Home</span></a>
  <a class="bn" href="movies.html"><i class="fa fa-film"></i><span>Movies</span></a>
  <a class="bn active" href="news.html"><i class="fa fa-newspaper"></i><span>News</span></a>
  <a class="bn" href="weather.html"><i class="fa fa-cloud-sun"></i><span>Weather</span></a>
  <a class="bn" href="more.html"><i class="fa fa-grid-2"></i><span>More</span></a>
  <a class="bn" href="index.html"><i class="fa fa-circle-user"></i><span>Profile</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
let isDark=localStorage.getItem("sparktv-theme")!=="light";
applyTheme(isDark);
function applyTheme(d){
  isDark=d;
  document.documentElement.setAttribute("data-theme",d?"dark":"light");
  document.getElementById("th-ic").className=d?"fa fa-sun":"fa fa-moon";
  localStorage.setItem("sparktv-theme",d?"dark":"light");
}
document.getElementById("theme-toggle").addEventListener("click",()=>applyTheme(!isDark));

const CATEGORIES=[
  {id:"general",label:"🌍 Top Stories",feed:"https://feeds.bbci.co.uk/news/rss.xml"},
  {id:"world",label:"🗺 World",feed:"https://feeds.bbci.co.uk/news/world/rss.xml"},
  {id:"technology",label:"💻 Tech",feed:"https://feeds.bbci.co.uk/news/technology/rss.xml"},
  {id:"entertainment",label:"🎬 Entertainment",feed:"https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml"},
  {id:"sports",label:"⚽ Sports",feed:"https://feeds.bbci.co.uk/news/sport/rss.xml"},
  {id:"business",label:"💼 Business",feed:"https://feeds.bbci.co.uk/news/business/rss.xml"},
  {id:"health",label:"🏥 Health",feed:"https://feeds.bbci.co.uk/news/health/rss.xml"},
  {id:"science",label:"🔬 Science",feed:"https://feeds.bbci.co.uk/news/science_and_environment/rss.xml"},
  {id:"africa",label:"🌍 Africa",feed:"https://feeds.bbci.co.uk/news/world/africa/rss.xml"},
];

let selCat="general", allItems=[], searchQ="";

async function loadNews(cat){
  selCat=cat; buildCats(); searchQ="";
  const input=document.getElementById("news-search");
  if(input) input.value="";
  document.getElementById("news-grid").innerHTML='<div class="loading"><i class="fa fa-spinner fa-spin" style="color:var(--accent);display:block;margin-bottom:8px;font-size:28px;"></i>Loading news…</div>';
  document.getElementById("news-count").textContent="";
  const catObj=CATEGORIES.find(c=>c.id===cat)||CATEGORIES[0];
  try{
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(catObj.feed)}&count=30`);
    if(!r.ok) throw new Error("Network error");
    const d=await r.json();
    if(d.items&&d.items.length>0){
      allItems=d.items;
      renderNews(allItems, d.feed?.title||"BBC News");
    }else{
      throw new Error("No items");
    }
  }catch(e){
    // Fallback: try a different proxy
    try{
      const r2=await fetch(`https://rss2json.com/api.json?rss_url=${encodeURIComponent(catObj.feed)}&api_key=&count=25`);
      const d2=await r2.json();
      if(d2.items&&d2.items.length){allItems=d2.items;renderNews(d2.items,"News");}
      else throw new Error("No items");
    }catch(e2){
      document.getElementById("news-grid").innerHTML=`
        <div class="loading" style="color:var(--red);">
          <i class="fa fa-exclamation-triangle" style="color:var(--gold);display:block;margin-bottom:10px;font-size:32px;"></i>
          Could not load news. Please check your connection.
          <br/><button onclick="loadNews('${cat}')" style="margin-top:12px;padding:8px 20px;border-radius:10px;border:none;background:var(--spark);color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Retry</button>
        </div>`;
    }
  }
}

function renderNews(items, src){
  if(!items||!items.length) return;
  document.getElementById("news-count").textContent=`${items.length} articles`;
  const grid=document.getElementById("news-grid");
  grid.innerHTML=items.map((item,idx)=>{
    const date=item.pubDate?new Date(item.pubDate).toLocaleDateString("en",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";
    const img=item.thumbnail||item.enclosure?.link||"";
    const isFeatured=idx===0;
    const desc=item.description?item.description.replace(/<[^>]+>/g,"").trim().slice(0,120):"";
    return `<a class="news-card${isFeatured?" featured":""}" href="${xe(item.link||"#")}" target="_blank" rel="noopener noreferrer">
      ${isFeatured?`
        <div class="news-img">${img?`<img src="${xe(img)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<i class=\\'fa fa-newspaper\\'></i>'">`:'<i class="fa fa-newspaper"></i>'}</div>
      `:`
        <div class="news-img">${img?`<img src="${xe(img)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<i class=\\'fa fa-newspaper\\'></i>'">`:'<i class="fa fa-newspaper"></i>'}</div>
      `}
      <div class="news-body">
        <div class="news-source-row">
          <div class="news-source">${xe(src)}</div>
          <span class="news-cat-tag">${selCat.toUpperCase()}</span>
        </div>
        <div class="news-title">${xe(item.title||"")}</div>
        ${isFeatured&&desc?`<div class="news-desc">${xe(desc)}</div>`:""}
        <div class="news-date"><i class="fa fa-clock" style="margin-right:3px;opacity:.6;"></i>${date}</div>
      </div>
    </a>`;
  }).join("");
}

window.filterNews=function(q){
  searchQ=q.toLowerCase().trim();
  if(!searchQ){renderNews(allItems,"BBC News");return;}
  const filtered=allItems.filter(item=>(item.title||"").toLowerCase().includes(searchQ)||(item.description||"").toLowerCase().includes(searchQ));
  renderNews(filtered,"BBC News");
  document.getElementById("news-count").textContent=`${filtered.length} results`;
};

function buildCats(){
  document.getElementById("cats").innerHTML=CATEGORIES.map(c=>`
    <div class="cc${c.id===selCat?" active":""}" onclick="loadNews('${c.id}')">${c.label}</div>`).join("");
}

buildCats();
loadNews("general");

let _tt;
function toast(msg,type){
  const el=document.getElementById("toast");
  el.className=`toast ${type||"info"} show`;el.textContent=msg;
  clearTimeout(_tt);_tt=setTimeout(()=>{el.className="toast";},3500);
}
function xe(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
</script>
</body>
</html>
